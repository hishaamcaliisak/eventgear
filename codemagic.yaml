workflows:
  ios-sideload:
    name: iOS Sideload Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r ../../../EventGear.ipa Payload
          cd ../../..

    artifacts:
      - EventGear.ipa

    publishing:
      email:
        recipients:
          - hishaamcali66@gmail.com
        notify:
          success: true
          failure: true
