workflows:
  ios-sideload:
    name: iOS Sideload Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Set bundle ID
        script: |
          find . -name "project.pbxproj" -exec sed -i '' 's/com.example.eventgearFlutter/com.hishaam.eventgear/g' {} \;

      - name: Get Flutter packages
        script: flutter pub get

      - name: Fix iOS pods
        script: |
          cd ios && pod install

      - name: Build unsigned IPA
        script: |
          flutter build ios --release --no-codesign
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r EventGear.ipa Payload
          rm -rf Payload

    artifacts:
      - EventGear.ipa

    publishing:
      email:
        recipients:
          - hishaamcali66@gmail.com  # your email
        notify:
          success: true
          failure: true
